# Add this top-level namespace if it isn't there, 
# and ensure the manager name matches exactly.
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: True
    # CRITICAL: If a node is in this list, it MUST exist below. 
    # If a node exists below but isn't here, it won't activate.
    node_names: ['map_server', 'amcl', 'planner_server', 'controller_server', 'behavior_server', 'bt_navigator', 'velocity_smoother', 'collision_monitor']
    bond_timeout: 4.0

amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    laser_model_type: "likelihood_field"
    max_particles: 2000
    min_particles: 500
    scan_topic: scan
    transform_tolerance: 1.0

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_frame: odom
    # Update this line with the full path:
    default_bt_xml_filename: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    plugin_lib_names: 
      - nav2_back_up_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_goal_reached_condition_bt_node

# Keeping docking_server but excluded from lifecycle_manager to prevent boot-loops
docking_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 50.0
    dock_plugins: ['simple_dock']
    simple_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_timeout: 300.0

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"

local_costmap:
  local_costmap: # Sub-namespace often required by nav2
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55

global_costmap:
  global_costmap: # Sub-namespace often required by nav2
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55

behavior_server:
  ros__parameters:
    use_sim_time: True
    # In Jazzy, if you leave these out, it defaults to the correct internal subscriptions.
    # If you MUST have them, use leading slashes to ensure absolute global names:
    local_costmap_topic: "/local_costmap/costmap"
    global_costmap_topic: "/global_costmap/costmap"
    local_footprint_topic: "/local_costmap/published_footprint"

velocity_smoother:
  ros__parameters:
    use_sim_time: True

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    source_timeout: 2.0
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
    polygons: ["Slowdown"]
    Slowdown:
      type: "circle"
      radius: 0.5
      action_type: "slowdown"
      slowdown_ratio: 0.5